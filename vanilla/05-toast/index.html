<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>05 Toast — Vanilla</title>
  <link rel="stylesheet" href="../_shared/base.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <h1>05 · Toast / Notification</h1>
  <div class="todo-banner">🔨 아래 주석을 참고하여 main.ts와 style.css를 구현하세요</div>

  <section class="section">
    <h2>토스트 트리거</h2>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button id="btn-info">ℹ️ Info</button>
      <button id="btn-success">✅ Success</button>
      <button id="btn-error">❌ Error</button>
      <button id="btn-warning">⚠️ Warning</button>
    </div>
  </section>

  <!-- 토스트 컨테이너 (position:fixed) -->
  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <script type="module" src="./main.ts"></script>
