<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>13 Date Picker — Vanilla</title>
  <link rel="stylesheet" href="../_shared/base.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <h1>13 · Date Picker</h1>
  <div class="todo-banner">🔨 아래 주석을 참고하여 main.ts와 style.css를 구현하세요</div>

  <section class="section">
    <div id="datepicker-container">
      <input type="text" id="date-input" placeholder="날짜 선택..." readonly />
      <div id="calendar" hidden>
        <div id="calendar-header">
          <button id="prev-month" aria-label="이전 월">‹</button>
          <span id="month-label"></span>
          <button id="next-month" aria-label="다음 월">›</button>
        </div>
        <div id="weekdays"></div>
        <div id="days-grid" role="grid"></div>
      </div>
    </div>
  </section>

  <script type="module" src="./main.ts"></script>
</body>
</html>
