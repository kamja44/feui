<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>03 Modal — Vanilla</title>
  <link rel="stylesheet" href="../_shared/base.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <h1>03 · Modal / Dialog</h1>
  <div class="todo-banner">🔨 아래 주석을 참고하여 main.ts와 style.css를 구현하세요</div>

  <section class="section">
    <h2>모달 열기</h2>
    <button id="open-modal">모달 열기</button>
  </section>

  <!-- 모달 마크업 (display:none 에서 시작) -->
  <div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div id="modal">
      <h2 id="modal-title">모달 제목</h2>
      <p>모달 내용이 들어갑니다.</p>
      <button id="close-modal">닫기</button>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
